<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Cash Shalom · KAZYE</title>
    <!-- PWA manifest -->
    <link rel="manifest" href="manifest.json">
    <!-- Apple touch icon pour iOS -->
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5571/5571550.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0066ff">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* thème bleu électrique / blanc / noir /vert */
        :root {
            --bg-main: #0a1a24;
            --surface: #112b38;
            --card-bg: #eef5fa;
            --electric-blue: #0066ff;
            --electric-glow: #0055dd;
            --text-light: #ffffff;
            --text-dark: #11181f;
            --paid-green: #00cc66;
            --paid-green-dark: #00994d;
            --border-soft: #c0d4e6;
            --shadow: rgba(0,102,255,0.2);
            --header-bg: #001f33;
            --calc-bg: #001a29;
            --btn-active: #0044aa;
        }

        body {
            background: var(--bg-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 0;
            color: var(--text-dark);
        }

        .app {
            width: 100%;
            max-width: 520px;
            background: var(--surface);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            box-shadow: 0 0 40px rgba(0,153,255,0.3);
            border-left: 2px solid var(--electric-blue);
            border-right: 2px solid var(--electric-blue);
        }

        /* HEADER BLEU ÉLECTRIQUE */
        .cash-header {
            background: var(--header-bg);
            padding: 12px 12px 8px 12px;
            color: white;
            border-bottom: 3px solid var(--electric-blue);
            position: sticky;
            top: 0;
            z-index: 30;
        }

        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
        }

        .cash-title {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.3px;
            color: white;
            text-shadow: 2px 2px 0 #000033;
        }

        .badge {
            background: var(--electric-blue);
            color: white;
            padding: 4px 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            border: 1px solid white;
        }

        .header-controls {
            display: flex;
            gap: 6px;
        }
        .icon-btn {
            background: #003d66;
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 30px;
            font-size: 24px;
            display: flex;
                align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid var(--electric-blue);
            box-shadow: 0 3px 0 #001a33;
        }
        .icon-btn:active {
            transform: translateY(3px);
            box-shadow: none;
        }

        /* --- NOUVEAU: BAR TOTAL KAZYE ANLÈ (PI VIZIB) --- */
        .total-kazye-bar {
            background: #004488;
            border-radius: 50px;
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid var(--electric-blue);
            margin: 8px 0 12px 0;
            box-shadow: 0 0 15px rgba(0,102,255,0.5);
        }
        .total-label {
            color: white;
            font-weight: 700;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .total-value {
            font-size: 28px;
            font-weight: 800;
            color: #80d4ff;
            line-height: 1;
            background: #002b44;
            padding: 4px 16px;
            border-radius: 40px;
            border: 1px solid var(--electric-blue);
        }
        .total-currency {
            color: #b3d9ff;
            margin-left: 4px;
            font-size: 18px;
        }
        .count-badge {
            background: #00cc66;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
        }
        /* --- FIN BAR TOTAL KAZYE --- */

        .balans-sticky {
            background: #002b44;
            border-radius: 50px;
            padding: 10px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--electric-blue);
            margin-top: 4px;
        }
        .balans-label { color: #9fc9ff; font-weight: 600; font-size: 16px; }
        .balans-value { font-size: 32px; font-weight: 800; color: white; line-height: 1; }
        .balans-currency { color: #b3d9ff; margin-left: 5px; font-size: 18px; }

        /* CARTES plus compactes */
        .card {
            background: var(--card-bg);
            margin: 8px 12px;
            padding: 14px 12px;
            border-radius: 24px;
            box-shadow: 0 4px 12px rgba(0,51,102,0.2);
            border: 1px solid var(--electric-blue);
        }

        .section-title {
            color: #003d66;
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* PLAN SCROLL plus fin */
        .plan-scroll {
            overflow-x: auto;
            padding: 2px 0 8px 0;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            white-space: nowrap;
        }
        .plan-btns { display: inline-flex; gap: 6px; }
        .plan-item {
            background: white;
            border: 2px solid var(--electric-blue);
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 700;
            color: #003366;
            font-size: 15px;
            box-shadow: 0 3px 0 #99c2ff;
            cursor: pointer;
        }
        .plan-item.active {
            background: var(--electric-blue);
            color: white;
            box-shadow: 0 3px 0 #003d99;
        }

        /* MODE TOGGLE compact */
        .mode-group {
            background: white;
            border-radius: 60px;
            padding: 3px;
            display: flex;
            border: 2px solid var(--electric-blue);
            margin-bottom: 12px;
        }
        .mode-btn {
            flex: 1;
            padding: 12px 0;
            border-radius: 60px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            background: transparent;
            color: #003d66;
        }
        .mode-btn.active {
            background: var(--electric-blue);
            color: white;
        }

        .input-field {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--electric-blue);
            border-radius: 60px;
            font-size: 16px;
            background: white;
        }
        .btn-action {
            background: var(--electric-blue);
            border: none;
            color: white;
            font-weight: 800;
            padding: 14px 18px;
            border-radius: 60px;
            font-size: 18px;
            box-shadow: 0 4px 0 #003d99;
            cursor: pointer;
        }
        .btn-action.retrait {
            background: #11181f;
            box-shadow: 0 4px 0 #000000;
        }

        /* GRILLE KAZYE - VERT quand sélectionné */
        .kazye-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin: 8px 0;
        }
        .kaz {
            background: white;
            border: 2px solid var(--electric-blue);
            border-radius: 16px;
            padding: 8px 2px;
            text-align: center;
            font-weight: 700;
            color: #002b44;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 3px 0 #b3d9ff;
        }
        .kaz small {
            font-size: 10px;
            font-weight: 600;
            display: block;
            color: #336699;
        }
        .kaz.paid {
            background: #00cc66;
            border-color: #008040;
            color: white;
            box-shadow: 0 3px 0 #00994d;
        }
        .kaz.paid small { color: #e6ffe6; }

        .paid-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0 6px;
        }
        .paid-total {
            background: #11181f;
            color: white;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 15px;
        }
        .btn-clear {
            background: #001f33;
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 600;
            border: 1px solid var(--electric-blue);
        }

        /* RESULT CARD (noir/bleu) */
        .result-card {
            background: #001a29;
            margin: 8px 12px 12px 12px;
            padding: 16px;
            border-radius: 28px;
            color: white;
            border: 2px solid var(--electric-blue);
        }
        .final-balance-large {
            font-size: 40px;
            font-weight: 800;
            color: #80d4ff;
        }
        .auto-list-mobile {
            background: #003355;
            padding: 12px;
            border-radius: 20px;
            margin-top: 12px;
            font-weight: 600;
        }
        .chip-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
        }
        .chip {
            background: #004477;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
        }

        .footer-actions {
            display: flex;
            gap: 10px;
            margin: 4px 12px 16px;
        }
        .btn-footer {
            flex: 1;
            background: #001f33;
            border: 2px solid var(--electric-blue);
            color: white;
            padding: 12px 0;
            border-radius: 40px;
            font-weight: 600;
        }

        .footer-shalom {
            text-align: center;
            color: #99ccff;
            font-weight: 600;
            padding: 8px 8px 16px;
        }

        /* MODAL CALCULATRICE PLEIN ÉCRAN */
        .calc-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0a1a29;
            z-index: 200;
            padding: 8px;
            overflow-y: auto;
        }
        .calc-modal.active { display: block; }
        
        .calc-container {
            background: #0a1a29;
            width: 100%;
            min-height: 100%;
            display: flex;
            flex-direction: column;
            padding: 8px 0;
        }
        
        .calc-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #001a33;
            border-radius: 20px;
            padding: 8px 16px;
            margin: 4px 8px 12px 8px;
            color: white;
            border: 2px solid #0066ff;
        }
        .calc-header-left {
            display: flex;
            gap: 16px;
            font-weight: 600;
        }
        .calc-header-left span {
            color: #99ccff;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
        }
        .calc-header-left span.active {
            background: #0066ff;
            color: white;
        }
        .calc-header-right {
            display: flex;
            gap: 12px;
        }
        .calc-header-right span {
            background: #004488;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
        }
        
        .calc-display {
            background: #000f1a;
            color: #80d4ff;
            font-size: 48px;
            font-weight: 700;
            text-align: right;
            padding: 20px 16px;
            border-radius: 20px;
            margin: 0 8px 16px 8px;
            border: 2px solid #0066ff;
            font-family: 'Courier New', monospace;
            min-height: 100px;
            word-break: break-all;
        }
        
        /* Lignes scientifiques */
        .calc-scientific-row {
            display: flex;
            gap: 6px;
            margin: 0 8px 6px 8px;
        }
        .calc-sci-btn {
            background: #003366;
            border: 2px solid #3399ff;
            color: white;
            font-size: 18px;
            font-weight: 600;
            padding: 16px 0;
            border-radius: 30px;
            flex: 1;
            text-align: center;
            box-shadow: 0 4px 0 #001a33;
            cursor: pointer;
        }
        .calc-sci-btn.special {
            background: #004488;
        }
        
        /* Grille principale */
        .calc-buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin: 8px 8px 12px 8px;
        }
        .calc-btn {
            background: #004488;
            border: none;
            color: white;
            font-size: 26px;
            font-weight: 600;
            padding: 20px 0;
            border-radius: 20px;
            box-shadow: 0 5px 0 #002244;
            cursor: pointer;
            text-align: center;
            border: 1px solid #66aaff;
        }
        .calc-btn.operator {
            background: #0066ff;
        }
        .calc-btn.equals {
            background: #00aa66;
            grid-column: span 2;
        }
        .calc-btn.del {
            background: #cc6600;
            font-size: 24px;
        }
        .calc-btn.clear {
            background: #cc3300;
        }
        .calc-btn:active {
            transform: translateY(5px);
            box-shadow: none;
        }
        
        .calc-close {
            background: #0066ff;
            border: none;
            color: white;
            font-size: 22px;
            font-weight: 700;
            padding: 18px;
            border-radius: 50px;
            margin: 8px 8px 20px 8px;
            width: calc(100% - 16px);
            cursor: pointer;
            border: 2px solid white;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- HEADER avec bouton calculatrice -->
        <div class="cash-header">
            <div class="header-row">
                <span class="cash-title">⚡CASH SHALOM</span>
                <div class="header-controls">
                    <button class="icon-btn" id="calcToggle">🧮</button>
                    <span class="badge">✡️</span>
                </div>
            </div>
            
            <!-- --- NOUVEAU: BAR TOTAL KAZYE ANLÈ --- -->
            <div class="total-kazye-bar">
                <div class="total-label">
                    <span>📊 TOTAL KAZYE SELÈKSYONNE</span>
                    <span class="count-badge" id="selectedCountHeader">0</span>
                </div>
                <div>
                    <span class="total-value" id="selectedTotalHeader">0.00</span>
                    <span class="total-currency">$</span>
                </div>
            </div>
            <!-- --- FIN BAR TOTAL KAZYE --- -->
            
            <div class="balans-sticky">
                <span class="balans-label">BALANS</span>
                <div style="display: flex; align-items: baseline;">
                    <span class="balans-value" id="balansDisplay">0.00</span>
                    <span class="balans-currency">$</span>
                </div>
            </div>
        </div>

        <!-- PLAN carte -->
        <div class="card">
            <div class="section-title">📋 PLAN (pri = nimewo × plan)</div>
            <div class="plan-scroll">
                <div class="plan-btns" id="planButtons"></div>
            </div>
        </div>

        <!-- DEPO/RETRAIT carte -->
        <div class="card">
            <div class="mode-group" id="modeGroup">
                <button id="modeDepot" class="mode-btn active">💵 DEPO</button>
                <button id="modeRetrait" class="mode-btn">💰 RETRÈ</button>
            </div>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <input type="number" id="montantField" class="input-field" placeholder="Montan $" min="0">
                <button class="btn-action" id="actionButton">🧮 KALKILE</button>
            </div>
        </div>

        <!-- KAZYE carte -->
        <div class="card">
            <div class="paid-header">
                <span class="paid-total" id="totalPaidDisplay">0.00$</span>
                <button class="btn-clear" id="clearPaidBtn">🗑️ Efase</button>
            </div>
            <p style="color:#0066cc; font-size:13px; margin:4px 0;">▼ klike sou kaz vèt si peye</p>
            <div class="kazye-grid" id="kazyeGrid"></div>
        </div>

        <!-- REZILTA CARD -->
        <div class="result-card">
            <div style="display: flex; justify-content: space-between;">
                <span>BALANS FINAL</span>
                <span class="final-balance-large" id="finalBalance">0.00</span>
            </div>
            <div class="auto-list-mobile" id="autoList">—</div>
            <div class="chip-group">
                <span class="chip">📌 PLAN: <span id="planLabel">5$</span></span>
                <span class="chip">📆 DÈNYE: <span id="lastPaidLabel">0</span></span>
                <span class="chip">🆕 DISPONIB: <span id="availableStartLabel">1</span></span>
            </div>
        </div>

        <!-- BOUTON FÒTER -->
        <div class="footer-actions">
            <button class="btn-footer" id="verifyBtn">✅ Verifye</button>
            <button class="btn-footer" id="resetBalanceBtn">🔄 Reset balans</button>
        </div>
        <div class="footer-shalom">✡️ SHALOM · BLEU ÉLECTRIQUE ✡️</div>
    </div>

    <!-- MODAL CALCULATRICE PLEIN ÉCRAN -->
    <div class="calc-modal" id="calcModal">
        <div class="calc-container">
            <div class="calc-header">
                <div class="calc-header-left">
                    <span class="active">DEG</span>
                    <span>RAD</span>
                </div>
                <div class="calc-header-right">
                    <span>sin</span>
                    <span>cos</span>
                    <span>tan</span>
                </div>
            </div>
            
            <div class="calc-display" id="calcDisplay">0</div>
            
            <!-- Lignes scientifiques -->
            <div class="calc-scientific-row">
                <button class="calc-sci-btn" onclick="calcInput('%')">%</button>
                <button class="calc-sci-btn" onclick="calcFn('ln')">ln</button>
                <button class="calc-sci-btn" onclick="calcFn('log')">log</button>
                <button class="calc-sci-btn" onclick="calcFn('sqrt')">√</button>
                <button class="calc-sci-btn" onclick="calcInput('**')">^</button>
            </div>
            <div class="calc-scientific-row">
                <button class="calc-sci-btn special" onclick="calcInput('π')">π</button>
                <button class="calc-sci-btn special" onclick="calcInput('e')">e</button>
                <button class="calc-sci-btn" onclick="calcInput('(')">(</button>
                <button class="calc-sci-btn" onclick="calcInput(')')">)</button>
                <button class="calc-sci-btn" onclick="calcFn('fact')">!</button>
            </div>
            
            <!-- Grille principale avec boutons C et ← -->
            <div class="calc-buttons">
                <button class="calc-btn" onclick="calcInput('7')">7</button>
                <button class="calc-btn" onclick="calcInput('8')">8</button>
                <button class="calc-btn" onclick="calcInput('9')">9</button>
                <button class="calc-btn operator" onclick="calcOp('/')">÷</button>
                <button class="calc-btn operator" onclick="calcFn('sin')">sin</button>
                
                <button class="calc-btn" onclick="calcInput('4')">4</button>
                <button class="calc-btn" onclick="calcInput('5')">5</button>
                <button class="calc-btn" onclick="calcInput('6')">6</button>
                <button class="calc-btn operator" onclick="calcOp('*')">×</button>
                <button class="calc-btn operator" onclick="calcFn('cos')">cos</button>
                
                <button class="calc-btn" onclick="calcInput('1')">1</button>
                <button class="calc-btn" onclick="calcInput('2')">2</button>
                <button class="calc-btn" onclick="calcInput('3')">3</button>
                <button class="calc-btn operator" onclick="calcOp('-')">−</button>
                <button class="calc-btn operator" onclick="calcFn('tan')">tan</button>
                
                <button class="calc-btn" onclick="calcInput('0')">0</button>
                <button class="calc-btn" onclick="calcInput('.')">.</button>
                <button class="calc-btn clear" onclick="calcClearAll()">C</button>
                <button class="calc-btn operator" onclick="calcOp('+')">+</button>
                <button class="calc-btn del" onclick="calcDelete()">←</button>
                
                <!-- Bouton = sur deux colonnes -->
                <button class="calc-btn equals" onclick="calcEquals()">=</button>
            </div>
            
            <button class="calc-close" id="closeCalc">Fèmen</button>
        </div>
    </div>

    <script>
        (function() {
            // ---------- ÉTAT PRINCIPAL ----------
            let balans = 0;
            let plan = 5;
            const PLAN_LIST = [1,2,3,4,5,10,15,20,50];
            let paid = new Array(31).fill(false);
            let mode = 'depot';

            // ---------- CONSTANTES STORAGE ----------
            const STORAGE_KEY = 'cashShalomData';

            // DOM principal
            const balansDisplay = document.getElementById('balansDisplay');
            const planButtons = document.getElementById('planButtons');
            const kazyeGrid = document.getElementById('kazyeGrid');
            const totalPaidDisplay = document.getElementById('totalPaidDisplay');
            const modeDepot = document.getElementById('modeDepot');
            const modeRetrait = document.getElementById('modeRetrait');
            const actionButton = document.getElementById('actionButton');
            const montantField = document.getElementById('montantField');
            const finalBalance = document.getElementById('finalBalance');
            const autoList = document.getElementById('autoList');
            const planLabel = document.getElementById('planLabel');
            const lastPaidLabel = document.getElementById('lastPaidLabel');
            const availableStartLabel = document.getElementById('availableStartLabel');
            const clearPaidBtn = document.getElementById('clearPaidBtn');
            const verifyBtn = document.getElementById('verifyBtn');
            const resetBalanceBtn = document.getElementById('resetBalanceBtn');
            const calcToggle = document.getElementById('calcToggle');
            const calcModal = document.getElementById('calcModal');
            const closeCalc = document.getElementById('closeCalc');
            
            // --- NOUVEAU: Éléments pour bar total anlè ---
            const selectedTotalHeader = document.getElementById('selectedTotalHeader');
            const selectedCountHeader = document.getElementById('selectedCountHeader');

            // ---------- FONCTIONS DE SAUVEGARDE ----------
            function saveData() {
                const dataToSave = {
                    balans: balans,
                    plan: plan,
                    paid: paid,
                    mode: mode,
                    lastUpdated: new Date().toISOString()
                };
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(dataToSave));
                    console.log('Données sauvegardées');
                } catch (e) {
                    console.error('Erreur de sauvegarde:', e);
                }
            }

            function loadData() {
                try {
                    const savedData = localStorage.getItem(STORAGE_KEY);
                    if (savedData) {
                        const data = JSON.parse(savedData);
                        balans = data.balans || 0;
                        plan = data.plan || 5;
                        paid = data.paid || new Array(31).fill(false);
                        mode = data.mode || 'depot';
                        console.log('Données chargées');
                    }
                } catch (e) {
                    console.error('Erreur de chargement:', e);
                }
            }

            // ---------- FONCTIONS PRINCIPALES ----------
            function updateBalansUI() {
                balansDisplay.innerText = balans.toFixed(2);
                finalBalance.innerText = balans.toFixed(2);
                saveData();
            }

            // --- NOUVELLE FONCTION: Met à jour le total en haut ---
            function updateHeaderTotal() {
                let total = 0;
                let count = 0;
                for (let i = 1; i <= 30; i++) {
                    if (paid[i]) {
                        total += i * plan;
                        count++;
                    }
                }
                if (selectedTotalHeader) selectedTotalHeader.innerText = total.toFixed(2);
                if (selectedCountHeader) selectedCountHeader.innerText = count;
                return { total, count };
            }

            function buildPlanButtons() {
                planButtons.innerHTML = '';
                PLAN_LIST.forEach(p => {
                    const btn = document.createElement('button');
                    btn.innerText = `${p}$`;
                    btn.className = 'plan-item';
                    if (p === plan) btn.classList.add('active');
                    btn.onclick = () => {
                        document.querySelectorAll('.plan-item').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        plan = p;
                        planLabel.innerText = `${plan}$`;
                        refreshGridPrices();
                        updateTotalPaidAndLabels();
                        updateHeaderTotal(); // Met à jour bar anlè
                        saveData();
                    };
                    planButtons.appendChild(btn);
                });
            }

            function refreshGridPrices() {
                for (let i=1; i<=30; i++) {
                    const kazDiv = document.querySelector(`.kaz[data-kazye="${i}"]`);
                    if (kazDiv) {
                        let small = kazDiv.querySelector('small');
                        if (!small) { small = document.createElement('small'); kazDiv.appendChild(small); }
                        small.innerText = `${i*plan}$`;
                    }
                }
            }

            function renderKazyeGrid() {
                let html = '';
                for (let i=1; i<=30; i++) {
                    const paidClass = paid[i] ? 'paid' : '';
                    html += `<div class="kaz ${paidClass}" data-kazye="${i}" onclick="window.togglePaid(${i})">
                        ${i}<br><small>${i*plan}$</small>
                    </div>`;
                }
                kazyeGrid.innerHTML = html;
            }

            window.togglePaid = function(k) {
                paid[k] = !paid[k];
                const el = document.querySelector(`.kaz[data-kazye="${k}"]`);
                if (el) paid[k] ? el.classList.add('paid') : el.classList.remove('paid');
                updateTotalPaidAndLabels();
                updateHeaderTotal(); // Met à jour bar anlè
                saveData();
            };

            function updateTotalPaidAndLabels() {
                let total=0, last=0;
                for (let i=1; i<=30; i++) { if(paid[i]) { total += i*plan; last = i; } }
                totalPaidDisplay.innerText = total.toFixed(2)+'$';
                lastPaidLabel.innerText = last;
                let first = 1;
                for (let i=1; i<=30; i++) { if(!paid[i]) { first = i; break; } }
                availableStartLabel.innerText = first;
                return { total, last };
            }

            function handleDepot() {
                const m = parseFloat(montantField.value);
                if (isNaN(m) || m<=0) { alert('Montan valab'); return; }
                balans += m;
                let rest = balans;
                const newSel = [];
                for (let k=1; k<=30; k++) {
                    if (!paid[k]) {
                        const price = k * plan;
                        if (price <= rest) { newSel.push(k); rest -= price; } else break;
                    }
                }
                newSel.forEach(k => { if(!paid[k]) { paid[k]=true; document.querySelector(`.kaz[data-kazye="${k}"]`)?.classList.add('paid'); } });
                balans = rest;
                updateBalansUI();
                updateTotalPaidAndLabels();
                updateHeaderTotal(); // Met à jour bar anlè
                autoList.innerText = newSel.length ? newSel.join(' · ') : 'Pa gen nouvo kazye.';
                montantField.value = '';
                saveData();
            }

            function handleRetrait() {
                const m = parseFloat(montantField.value);
                if (isNaN(m) || m<=0) { alert('Montan valab'); return; }
                if (m > balans) { alert('Balans ensifizan'); return; }
                balans -= m;
                updateBalansUI();
                // Bar anlè pa chanje paske paid[] pa chanje
                autoList.innerText = '— Retrè senp';
                montantField.value = '';
                saveData();
            }

            function setMode(newMode) {
                mode = newMode;
                if (mode==='depot') {
                    modeDepot.classList.add('active'); modeRetrait.classList.remove('active');
                    actionButton.innerText = '🧮 KALKILE'; actionButton.classList.remove('retrait');
                } else {
                    modeRetrait.classList.add('active'); modeDepot.classList.remove('active');
                    actionButton.innerText = '💸 RETIRE'; actionButton.classList.add('retrait');
                }
                saveData();
            }

            function clearAllPaid() { 
                for (let i=1;i<=30;i++) { 
                    paid[i]=false; 
                    document.querySelector(`.kaz[data-kazye="${i}"]`)?.classList.remove('paid'); 
                } 
                updateTotalPaidAndLabels(); 
                updateHeaderTotal(); // Met à jour bar anlè
                saveData();
            }
            
            function verifyBalans() { 
                let t = updateTotalPaidAndLabels().total; 
                alert(t>balans ? `⚠️ Depase ${t.toFixed(2)}$ > ${balans.toFixed(2)}$` : `✅ OK Rest: ${(balans-t).toFixed(2)}$`); 
            }
            
            function resetBalance() { 
                balans = 0; 
                updateBalansUI(); 
                saveData();
            }

            // ---------- CALCULATRICE PLEIN ÉCRAN (pa chanje) ----------
            let calcStr = '0';
            const calcDisplay = document.getElementById('calcDisplay');
            
            function updateCalcDisplay() {
                calcDisplay.innerText = calcStr;
            }
            
            window.calcInput = function(c) {
                if (c === 'π') c = Math.PI.toString();
                if (c === 'e') c = Math.E.toString();
                if (c === '%') c = '/100';
                if (calcStr === '0' && !'+-*/'.includes(c)) {
                    calcStr = c;
                } else {
                    calcStr += c;
                }
                updateCalcDisplay();
            };
            
            window.calcOp = function(op) {
                calcStr += op;
                updateCalcDisplay();
            };
            
            window.calcFn = function(fn) {
                if (fn === 'sqrt') calcStr = `Math.sqrt(${calcStr})`;
                else if (fn === 'ln') calcStr = `Math.log(${calcStr})`;
                else if (fn === 'log') calcStr = `Math.log10(${calcStr})`;
                else if (fn === 'fact') {
                    let n = parseInt(calcStr);
                    let f = 1;
                    for (let i=2; i<=n; i++) f *= i;
                    calcStr = f.toString();
                } else if (fn === 'sin') calcStr = `Math.sin(${calcStr})`;
                else if (fn === 'cos') calcStr = `Math.cos(${calcStr})`;
                else if (fn === 'tan') calcStr = `Math.tan(${calcStr})`;
                updateCalcDisplay();
            };
            
            window.calcClearAll = function() { 
                calcStr = '0'; 
                updateCalcDisplay(); 
            };
            
            window.calcDelete = function() {
                if (calcStr.length > 1) {
                    calcStr = calcStr.slice(0, -1);
                } else {
                    calcStr = '0';
                }
                updateCalcDisplay();
            };
            
            window.calcEquals = function() {
                try {
                    calcStr = eval(calcStr).toString();
                } catch {
                    calcStr = 'Error';
                }
                updateCalcDisplay();
            };
            
            calcToggle.addEventListener('click', () => calcModal.classList.add('active'));
            closeCalc.addEventListener('click', () => calcModal.classList.remove('active'));
            calcModal.addEventListener('click', (e) => { if(e.target === calcModal) calcModal.classList.remove('active'); });

            // ---------- INITIALISATION ----------
            function init() {
                loadData();
                buildPlanButtons(); 
                renderKazyeGrid(); 
                planLabel.innerText = `${plan}$`; 
                updateBalansUI(); 
                updateTotalPaidAndLabels();
                updateHeaderTotal(); // Initialise bar anlè
                setMode(mode);
                
                modeDepot.addEventListener('click', ()=>setMode('depot'));
                modeRetrait.addEventListener('click', ()=>setMode('retrait'));
                actionButton.addEventListener('click', ()=> mode==='depot'? handleDepot() : handleRetrait());
                clearPaidBtn.addEventListener('click', clearAllPaid);
                verifyBtn.addEventListener('click', verifyBalans);
                resetBalanceBtn.addEventListener('click', resetBalance);
            }
            
            init();
        })();
    </script>

    <!-- Service Worker pour PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('Service Worker enregistré avec succès');
                    })
                    .catch(err => {
                        console.log('Échec enregistrement Service Worker: ', err);
                    });
            });
        }
    </script>
</body>
